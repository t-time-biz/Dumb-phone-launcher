<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dumb Phone">
    <title>Dumb Phone Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            background: rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 14px;
            color: #999;
            font-weight: 400;
        }

        .setup-mode {
            background: rgba(255,255,255,0.05);
            margin: 20px;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .setup-mode h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4CAF50;
        }

        .app-selector {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .app-option {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .app-option:active {
            transform: scale(0.98);
        }

        .app-option.selected {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
        }

        .app-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #666;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .app-option.selected .app-checkbox {
            background: #4CAF50;
            border-color: #4CAF50;
        }

        .app-checkbox::after {
            content: '✓';
            color: white;
            font-size: 16px;
            opacity: 0;
        }

        .app-option.selected .app-checkbox::after {
            opacity: 1;
        }

        .app-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .app-name {
            font-size: 16px;
            font-weight: 500;
        }

        .save-button {
            width: 100%;
            padding: 16px;
            background: #4CAF50;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-button:active {
            transform: scale(0.98);
            background: #45a049;
        }

        .launcher-mode {
            padding: 20px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .app-button {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            padding: 25px 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            color: white;
            backdrop-filter: blur(10px);
        }

        .app-button:active {
            transform: scale(0.95);
            background: rgba(255,255,255,0.15);
        }

        .app-button-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .app-button-name {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .settings-button {
            position: fixed;
            bottom: 30px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.2s;
            z-index: 1000;
        }

        .settings-button:active {
            transform: scale(0.9);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 15px;
        }

        .hidden {
            display: none;
        }

        .app-phone { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .app-messages { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .app-camera { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .app-photos { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .app-maps { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .app-safari { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .app-mail { background: linear-gradient(135deg, #5f72bd 0%, #9b23ea 100%); }
        .app-calendar { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
        .app-notes { background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%); }
        .app-clock { background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); }
        .app-weather { background: linear-gradient(135deg, #56ccf2 0%, #2f80ed 100%); }
        .app-podcasts { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .app-music { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
        .app-settings { background: linear-gradient(135deg, #757f9a 0%, #d7dde8 100%); }
    </style>
</head>
<body>
    <div class="header">
        <h1>📱 Dumb Phone</h1>
        <p>Essential apps only</p>
    </div>

    <div id="setupMode" class="setup-mode">
        <h2>Choose Your Essential Apps</h2>
        <div class="app-selector" id="appSelector"></div>
        <button class="save-button" onclick="saveApps()">Save & Launch</button>
    </div>

    <div id="launcherMode" class="launcher-mode hidden">
        <div id="appGrid" class="app-grid"></div>
    </div>

    <button class="settings-button hidden" id="settingsBtn" onclick="showSetup()">⚙️</button>

    <script>
        const availableApps = [
            { name: 'Phone', icon: '📞', scheme: 'tel://', class: 'app-phone' },
            { name: 'Messages', icon: '💬', scheme: 'sms://', class: 'app-messages' },
            { name: 'FaceTime', icon: '📹', scheme: 'facetime://', class: 'app-phone' },
            { name: 'Camera', icon: '📷', scheme: 'camera://', class: 'app-camera' },
            { name: 'Photos', icon: '🖼️', scheme: 'photos-redirect://', class: 'app-photos' },
            { name: 'Maps', icon: '🗺️', scheme: 'maps://', class: 'app-maps' },
            { name: 'Safari', icon: '🧭', scheme: 'x-web-search://', class: 'app-safari' },
            { name: 'Mail', icon: '✉️', scheme: 'message://', class: 'app-mail' },
            { name: 'Calendar', icon: '📅', scheme: 'calshow://', class: 'app-calendar' },
            { name: 'Notes', icon: '📝', scheme: 'mobilenotes://', class: 'app-notes' },
            { name: 'Clock', icon: '⏰', scheme: 'clock://', class: 'app-clock' },
            { name: 'Weather', icon: '🌤️', scheme: 'weather://', class: 'app-weather' },
            { name: 'Podcasts', icon: '🎙️', scheme: 'podcasts://', class: 'app-podcasts' },
            { name: 'Music', icon: '🎵', scheme: 'music://', class: 'app-music' },
            { name: 'Contacts', icon: '👤', scheme: 'contacts://', class: 'app-phone' },
            { name: 'Reminders', icon: '✅', scheme: 'x-apple-reminder://', class: 'app-notes' },
            { name: 'Settings', icon: '⚙️', scheme: 'App-prefs://', class: 'app-settings' },
            { name: 'Voice Memos', icon: '🎤', scheme: 'voicememos://', class: 'app-music' }
        ];

        let selectedApps = [];
        
        function loadSettings() {
            const saved = localStorage.getItem('dumbPhoneApps');
            if (saved) {
                selectedApps = JSON.parse(saved);
                showLauncher();
            } else {
                renderSetup();
            }
        }

        function renderSetup() {
            const selector = document.getElementById('appSelector');
            selector.innerHTML = availableApps.map((app, index) => `
                <div class="app-option ${selectedApps.includes(index) ? 'selected' : ''}" 
                     onclick="toggleApp(${index})">
                    <div class="app-checkbox"></div>
                    <div class="app-icon ${app.class}">${app.icon}</div>
                    <div class="app-name">${app.name}</div>
                </div>
            `).join('');
        }

        function toggleApp(index) {
            const appIndex = selectedApps.indexOf(index);
            if (appIndex > -1) {
                selectedApps.splice(appIndex, 1);
            } else {
                selectedApps.push(index);
            }
            renderSetup();
        }

        function saveApps() {
            if (selectedApps.length === 0) {
                alert('Please select at least one app');
                return;
            }
            localStorage.setItem('dumbPhoneApps', JSON.stringify(selectedApps));
            showLauncher();
        }

        function showLauncher() {
            document.getElementById('setupMode').classList.add('hidden');
            document.getElementById('launcherMode').classList.remove('hidden');
            document.getElementById('settingsBtn').classList.remove('hidden');
            renderLauncher();
        }

        function showSetup() {
            document.getElementById('setupMode').classList.remove('hidden');
            document.getElementById('launcherMode').classList.add('hidden');
            document.getElementById('settingsBtn').classList.add('hidden');
            renderSetup();
        }

        function renderLauncher() {
            const grid = document.getElementById('appGrid');
            
            if (selectedApps.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <h3>No Apps Selected</h3>
                        <p>Tap the settings button to choose your apps</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = selectedApps.map(index => {
                const app = availableApps[index];
                return `
                    <a href="${app.scheme}" class="app-button">
                        <div class="app-button-icon ${app.class}">${app.icon}</div>
                        <div class="app-button-name">${app.name}</div>
                    </a>
                `;
            }).join('');
        }

        loadSettings();

        document.body.addEventListener('touchmove', function(e) {
            if (window.scrollY === 0) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
